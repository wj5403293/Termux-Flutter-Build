name: 构建 Termux Flutter

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 目标架构
        required: true
        default: arm64
        type: choice
        options:
          - arm64
      preset:
        description: 构建预设
        required: true
        default: termux
        type: choice
        options:
          - termux
          - termux-linux
          - full-no-profile
          - full
          - android-release-only
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-termux-flutter-${{ github.ref }}-${{ inputs.arch || 'arm64' }}-${{ inputs.preset || 'termux' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: ${{ inputs.arch || 'arm64' }}
      EFFECTIVE_PRESET: ${{ github.event_name == 'push' && 'termux' || inputs.preset }}
      ANDROID_NDK: ${{ github.workspace }}/.cache/android-ndk-r28c

    steps:
      - name: 下载源代码
        uses: actions/checkout@v4

      - name: 清理磁盘空间
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          df -h

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y curl git ninja-build pkg-config unzip xz-utils libfreetype-dev

      - name: 配置 depot_tools
        uses: newkdev/setup-depot-tools@v1.0.1

      - name: 安装 Python 依赖
        run: python -m pip install -r requirements.txt

      - name: 提供 vpython 支持
        run: |
          if ! command -v vpython >/dev/null 2>&1; then
            printf '%s\n' '#!/usr/bin/env bash' 'exec python "$@"' | sudo tee /usr/local/bin/vpython >/dev/null
            sudo chmod +x /usr/local/bin/vpython
          fi

      - name: 恢复 sysroot 和 NDK 缓存
        uses: actions/cache@v4
        with:
          path: |
            .cache/android-ndk-r28c
            sysroot
            ~/.pub-cache
          key: ${{ runner.os }}-${{ env.ARCH }}-${{ hashFiles('build.toml', 'sysroot.py', 'package.yaml') }}

      - name: 安装 Android NDK r28c
        run: |
          mkdir -p "$(dirname "$ANDROID_NDK")"
          if [ ! -d "$ANDROID_NDK" ]; then
            curl -L --retry 3 https://dl.google.com/android/repository/android-ndk-r28c-linux.zip -o /tmp/android-ndk-r28c-linux.zip
            unzip -q /tmp/android-ndk-r28c-linux.zip -d "$(dirname "$ANDROID_NDK")"
            mv "$(dirname "$ANDROID_NDK")/android-ndk-r28c" "$ANDROID_NDK"
          fi
          test -d "$ANDROID_NDK"

      - name: 计算 Ninja 并行度
        id: jobs
        run: |
          CPUS=$(nproc)
          JOBS=$((CPUS > 2 ? CPUS - 1 : 2))
          echo "value=$JOBS" >> "$GITHUB_OUTPUT"

      - name: 验证工具链
        run: |
          command -v gclient
          command -v ninja
          command -v vpython
          test -f .gclient
          test -d "$ANDROID_NDK"

      - name: Clone Flutter
        run: python build.py clone

      - name: 同步依赖
        run: python build.py sync

      - name: 套用补丁
        run: |
          python build.py patch_engine
          python build.py patch_dart
          python build.py patch_skia
          python build.py patch_flutter_sdk

      - name: 组装 sysroot
        run: python build.py sysroot --arch="$ARCH"

      - name: 执行预设构建
        run: |
          mkdir -p logs
          set -o pipefail
          python build.py build_selected \
            --arch="$ARCH" \
            --preset="$EFFECTIVE_PRESET" \
            --jobs="${{ steps.jobs.outputs.value }}" \
            2>&1 | tee logs/build.log

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EFFECTIVE_PRESET }}-${{ env.ARCH }}
          path: |
            release/*.deb
            logs/*.log
            flutter/engine/src/out/android_release_arm64/clang_arm64/gen_snapshot
            flutter/engine/src/out/android_profile_arm64/exe.stripped/gen_snapshot
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 0

      - name: 建立 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.deb
          tag_name: ${{ github.ref_name }}
          name: flutter-termux-${{ github.ref_name }}-${{ env.ARCH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
